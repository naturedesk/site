# local Jekyll preview using a repo-built image so it works on arm64 as well as amd64
services:
  jekyll:
    image: naturedesk-jekyll-local
    build: .
    ports:
      - "${JEKYLL_HOST_PORT:-8081}:8080"
      - "${JEKYLL_LIVERELOAD_PORT:-35730}:35729"
    volumes:
      - .:/srv/jekyll
    environment:
      - JEKYLL_ENV=development
